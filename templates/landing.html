<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Shield - Smart Safety System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .feature {
            padding: 1rem;
            background: #f9fafb;
            border-radius: 10px;
        }

        .feature i {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .feature h6 {
            font-size: 0.9rem;
            color: #1f2937;
            font-weight: 600;
            margin: 0;
        }

        /* Language toggle for landing (standalone page - not using base.html) */
        .lang-toggle {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10000;
            background: linear-gradient(135deg, #ff9933, #138808);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.55rem 1.1rem;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .lang-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 data-i18n="landing_title">Tourist Shield</h1>
            <p class="subtitle" data-i18n="landing_subtitle">
                AI-Powered Smart Tourist Safety Monitoring &amp; Emergency Response System
            </p>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-brain"></i>
                    <h6 data-i18n="landing_ai">AI Monitoring</h6>
                </div>
                <div class="feature">
                    <i class="fas fa-map-marked-alt"></i>
                    <h6 data-i18n="landing_tracking">Live Tracking</h6>
                </div>
                <div class="feature">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h6 data-i18n="landing_sos">Emergency SOS</h6>
                </div>
                <div class="feature">
                    <i class="fas fa-file-pdf"></i>
                    <h6 data-i18n="landing_reports">Digital Reports</h6>
                </div>
            </div>

            <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">
                <i class="fas fa-sign-in-alt me-2"></i>
                <span data-i18n="landing_login_btn">Login to System</span>
            </a>
        </div>
    </div>

    <!-- Language Toggle Button -->
    <button id="langToggleBtn" class="lang-toggle" onclick="toggleLanguage()" title="भाषा बदलें / Change Language">
        🇮🇳 हिंदी
    </button>

    <script src="{{ url_for('static', filename='js/hi.js') }}"></script>
</body>

</html>
