{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div
    style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea,#764ba2); text-align:center; padding:2rem;">
    <div
        style="background:white; border-radius:24px; padding:3rem; max-width:500px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="font-size:6rem; margin-bottom:1rem;">🛡️</div>
        <h1 style="font-size:4rem; font-weight:900; color:#667eea; margin:0;">404</h1>
        <h2 style="font-weight:700; color:#1f2937; margin:0.5rem 0 1rem;">Page Not Found</h2>
        <p style="color:#6b7280; margin-bottom:2rem;">The page you are looking for doesn't exist or has been moved.</p>
        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
            <a href="{{ url_for('landing') }}" class="btn"
                style="background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; padding:0.75rem 1.5rem; border-radius:12px; font-weight:600; text-decoration:none;">
                <i class="fas fa-home me-2"></i>Go Home
            </a>
            <a href="{{ url_for('login') }}" class="btn"
                style="background:#f3f4f6; color:#374151; border:none; padding:0.75rem 1.5rem; border-radius:12px; font-weight:600; text-decoration:none;">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
