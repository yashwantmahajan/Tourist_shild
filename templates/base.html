<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Tourist Shield AI{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Language Toggle Button */
        .lang-toggle {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10000;
            background: linear-gradient(135deg, #ff9933, #138808);
            color: white !important;
            border: none;
            border-radius: 50px;
            padding: 0.55rem 1.1rem;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .lang-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .lang-toggle:active {
            transform: translateY(0);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Theme Toggle (Fixed position) -->
    <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Language Toggle Button -->
    <button id="langToggleBtn" class="lang-toggle" onclick="toggleLanguage()" title="भाषा बदलें / Change Language">
        🇮🇳 हिंदी
    </button>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header">
                <i class="fas fa-shield-alt text-primary me-2"></i>
                <strong class="me-auto">Shield AI</strong>
                <small class="toast-time">Just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body"></div>
        </div>
    </div>

    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- Hindi Language Engine (load before extra_js so translations work on DOMContentLoaded) -->
    <script src="{{ url_for('static', filename='js/hi.js') }}"></script>

    <!-- Flash Messages as Toast -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <script>
        {% for category, message in messages %}
        showToast('{{ message }}', '{{ category }}');
        {% endfor %}
    </script>
    {% endif %}
    {% endwith %}

    {% block extra_js %}{% endblock %}
</body>

</html>
